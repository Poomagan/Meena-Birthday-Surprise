<!DOCTYPE html>
<html>
<head>
<title>Catch the Hearts ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow:hidden;
text-align:center;
color:white;
}

h1{
margin-top:30px;
}

#score{
font-size:22px;
margin-top:10px;
}

.heart{
position:absolute;
font-size:35px;
cursor:pointer;
transition:transform 0.2s;
}

.heart:hover{
transform:scale(1.3);
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#ff4b6e;
padding:30px;
border-radius:20px;
font-size:22px;
display:none;
max-width:300px;
}

</style>

</head>

<body>

<h1>Catch the Hearts ❤️</h1>
<div id="score">Hearts Collected: 0 / 10</div>

<div id="message">
<h2>Happy Birthday ❤️</h2>
<p>
You caught all my hearts!<br><br>
You make my world beautiful.<br>
I love you always.
</p>
</div>

<script>

let score = 0;
const target = 10;

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*90+"vw";
heart.style.top=Math.random()*90+"vh";

heart.onclick=function(){

score++;

heart.remove();

document.getElementById("score").innerText =
"Hearts Collected: " + score + " / " + target;

if(score>=target){

document.getElementById("message").style.display="block";

}

}

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

setInterval(createHeart,900);

</script>

</body>
</html>
